[project]
name = "samj-env"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "win-64", "linux-64"]

# --------------------------------------------------
# Conda deps (non-torch)
# --------------------------------------------------
[dependencies]
python = ">=3.10"
scikit-image = "*"

# --------------------------------------------------
# Common pip deps
# --------------------------------------------------
[pypi-dependencies]
pytest = "*"
appose = "*"
sam-2 = "==1.0"

# --------------------------------------------------
# macOS
# --------------------------------------------------
[target.osx-arm64.pypi-dependencies]
torch = "==2.5.1"
torchvision = "==0.20.1"

[target.osx-64.pypi-dependencies]
torch = "==2.5.1"
torchvision = "==0.20.1"

# --------------------------------------------------
# Linux CUDA 12.1 wheels
# --------------------------------------------------
[target.linux-64.pypi-dependencies]
torch = "==2.5.1"
torchvision = "==0.20.1"

[target.linux-64.pypi-options]
index-url = "https://download.pytorch.org/whl/cu121"

# --------------------------------------------------
# Windows CUDA 12.1 wheels
# --------------------------------------------------
[target.win-64.pypi-dependencies]
torch = "==2.5.1"
torchvision = "==0.20.1"

[target.win-64.pypi-options]
index-url = "https://download.pytorch.org/whl/cu121"


# ==================================================
# 🔒 GLOBAL ENV ISOLATION (all platforms)
# ==================================================
[activation.env]
CUDA_HOME = ""
CUDA_PATH = ""
CUDA_ROOT = ""
LD_LIBRARY_PATH = ""
DYLD_LIBRARY_PATH = ""
PYTHONPATH = ""


# ==================================================
# TASKS
# ==================================================

# ----------------------
# Default (Linux/macOS)
# ----------------------
[tasks.default]
cmd = "python"
env = { CUDA_HOME="", CUDA_PATH="", CUDA_ROOT="", LD_LIBRARY_PATH="", DYLD_LIBRARY_PATH="", PYTHONPATH="" }


# ----------------------
# Tests (Linux/macOS)
# ----------------------
[tasks.test]
cmd = "pytest -q"
env = { CUDA_HOME="", CUDA_PATH="", CUDA_ROOT="", LD_LIBRARY_PATH="", DYLD_LIBRARY_PATH="", PYTHONPATH="" }


# ----------------------
# Windows-safe runner
# removes CUDA folders from PATH only
# ----------------------
[target.win-64.tasks.default]
cmd = '''
powershell -NoProfile -Command "
$clean = ($env:PATH -split ';' |
  Where-Object { $_ -notmatch 'CUDA\\\\v[0-9]+' }) -join ';';
$env:PATH = $clean;
$env:CUDA_HOME='';
$env:CUDA_PATH='';
python
"
'''

[target.win-64.tasks.test]
cmd = '''
powershell -NoProfile -Command "
$clean = ($env:PATH -split ';' |
  Where-Object { $_ -notmatch 'CUDA\\\\v[0-9]+' }) -join ';';
$env:PATH = $clean;
$env:CUDA_HOME='';
$env:CUDA_PATH='';
pytest -q
"
'''


# ----------------------
# Debug helper
# ----------------------
[tasks.check-gpu]
cmd = '''
python - <<EOF
import torch, os, sys
print("Torch:", torch.__version__)
print("CUDA available:", torch.cuda.is_available())
print("CUDA runtime:", torch.version.cuda)
print("PATH:", os.environ.get("PATH")[:200], "...")
EOF
'''