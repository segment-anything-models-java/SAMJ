[workspace]
name = "%s"
channels = ["https://prefix.dev/conda-forge"]
#platforms = ["linux-64", "win-64", "osx-64", "osx-arm64"]
platforms = ["linux-64", "win-64", "osx-arm64"]

# 🔒 GLOBAL ENV ISOLATION (all platforms)
# Applies to `pixi shell` activation + all `pixi run` tasks.
# ==================================================
[activation.env]
CUDA_HOME = ""
CUDA_PATH = ""
CUDA_ROOT = ""
LD_LIBRARY_PATH = ""
DYLD_LIBRARY_PATH = ""
PYTHONPATH = ""


[dependencies]
python = "==3.12"
scikit-image = "*"

# --- CPU-only (all platforms) ---
[feature.cpu]
#platforms = ["linux-64", "win-64", "osx-64", "osx-arm64"]
platforms = ["linux-64", "win-64", "osx-arm64"]
[feature.cpu.pypi-dependencies]
torch = { version = "==2.5.1", index = "https://download.pytorch.org/whl/cpu" }
torchvision = { version = "==0.20.1", index = "https://download.pytorch.org/whl/cpu" }

[feature.cuda]
platforms = ["linux-64", "win-64"]
[feature.cuda.pypi-dependencies]
torch = { version = "==2.5.1", index = "https://download.pytorch.org/whl/cu%s" }
torchvision = { version = "==0.20.1", index = "https://download.pytorch.org/whl/cu%s" }

[environments]
# Safe default everywhere (no GPU required)
default = { features = ["cpu"] }

cpu   = { features = ["cpu"] }
cuda = { features = ["cuda"] }


# ==================================================
# TASKS
# ==================================================
[tasks.python]
cmd = "python"

[tasks.test]
cmd = "pytest -q"

[tasks.check-gpu]
cmd = "python -c \"import torch; print('Torch:', torch.__version__); print('CUDA available:', torch.cuda.is_available()); print('CUDA runtime:', torch.version.cuda)\""

# ==================================================
# Windows: scrub CUDA from PATH for tasks
# (activation.env can't easily do "remove matching segments" from PATH)
# ==================================================
[target.win-64.tasks.python]
cmd = '''
powershell -NoProfile -Command "
$clean = ($env:PATH -split ';' | Where-Object { $_ -notmatch 'CUDA\\v[0-9]+' }) -join ';';
$env:PATH = $clean;
$env:CUDA_HOME='';
$env:CUDA_PATH='';
python
"
'''

[target.win-64.tasks.test]
cmd = '''
powershell -NoProfile -Command "
$clean = ($env:PATH -split ';' | Where-Object { $_ -notmatch 'CUDA\\v[0-9]+' }) -join ';';
$env:PATH = $clean;
$env:CUDA_HOME='';
$env:CUDA_PATH='';
pytest -q
"
'''

[target.win-64.tasks.check-gpu]
cmd = '''
powershell -NoProfile -Command "
$clean = ($env:PATH -split ';' | Where-Object { $_ -notmatch 'CUDA\\v[0-9]+' }) -join ';';
$env:PATH = $clean;
$env:CUDA_HOME='';
$env:CUDA_PATH='';
python -c \"import torch; print('Torch:', torch.__version__); print('CUDA available:', torch.cuda.is_available()); print('CUDA runtime:', torch.version.cuda)\"
"
'''
